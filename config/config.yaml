# ==========================================================
# SANDRAY Configuration
# Version 2.0 Alpha
# ==========================================================

version: "2.0-alpha2"

assistant:
  name: "SANDRAY"

wake_word:
  enabled: true

  phrases:
    - "SANDRAY"
    - "sand ray"

  silence_timeout: 0.8
  silence_threshold: 300

ai:
  provider: "openai"
  executable: "/usr/local/bin/aichat"
  model: "gpt-5-mini"

  personality: |
    You are Richard's trusted handheld AI companion.
    Respond naturally and conversationally.
    Do not introduce yourself unless asked.
    Do not list your capabilities unless asked.
    Answer the user's question directly.

  response:
    style: "natural conversation"
    max_words: 40
    markdown: false

memory:
  enabled: true
  max_turns: 20

speech:

  whisper:
    executable: "/home/richard/whisper.cpp/build/bin/whisper-cli"
    model: "/home/richard/whisper.cpp/models/ggml-base.en.bin"

  piper:
    executable: "/home/richard/.local/bin/piper"
    voice: "/home/richard/piper/en_GB-alan-medium.onnx"

audio:
  wake:
    delay: 3.5

  microphone: "alsa_input.usb-0b0e_Jabra_SPEAK_510_USB_70BF92550122021900-00.mono-fallback"

  speaker: "plughw:3,0"

  mirror_output: false

  silence_detection:
    enabled: true
    timeout: 1.5
    threshold: 300

interface:
  theme: "colour"
  developer_mode: false

logging:
  level: "developer"

system:
  auto_restart: true
